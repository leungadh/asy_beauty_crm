<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ASY Beaute — CRM</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#2563eb" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="ASY CRM" />
<link rel="apple-touch-icon" href="images/icon-192.png" />
<script>
  if ('serviceWorker' in navigator)
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
</script>
<style>
  /* ──────────────────────────────────────────────────────────
     ASY Beaute CRM — warm, friendly aesthetic with blue accent
     ────────────────────────────────────────────────────────── */
  :root {
    /* Warm cream surfaces */
    --bg: #faf6f1;
    --surface: #ffffff;
    --surface-2: #f5efe7;
    --surface-3: #ede4d6;
    --line: #ebe2d2;
    --line-strong: #d9cdb8;

    /* Ink — warm not cold */
    --ink:   #2a2419;
    --ink-2: #5a4f3e;
    --ink-3: #8a7d68;
    --ink-4: #b8aa92;

    /* Blue accent (trust + professional) — variation A */
    --accent: #2563eb;
    --accent-soft: #e8eefb;
    --accent-ink: #1d4ed8;
    --accent-on: #ffffff;

    /* Secondary warm rose for highlights */
    --rose: #c0568f;
    --rose-soft: #fbe9f1;

    --good: #2f7d59;
    --good-soft: #e6f1ec;
    --warn: #b97309;
    --bad: #b3261e;

    --radius: 14px;
    --radius-sm: 10px;
    --radius-pill: 999px;
    --shadow-sm: 0 1px 0 rgba(60,40,10,0.04), 0 1px 2px rgba(60,40,10,0.04);
    --shadow-md: 0 1px 0 rgba(60,40,10,0.04), 0 8px 24px rgba(60,40,10,0.07);
    --shadow-lg: 0 20px 60px rgba(60,40,10,0.10);
    --row-h: 40px;
  }

  /* Variation B — Rose pink primary */
  body[data-variant="rose"] {
    --accent: #d6477f;
    --accent-soft: #fbe7ef;
    --accent-ink: #ad2c63;
  }
  /* Variation C — Sage / Mocha */
  body[data-variant="sage"] {
    --bg: #f3efe6;
    --surface: #fbf8f1;
    --surface-2: #ece5d4;
    --line: #ddd2bb;
    --accent: #6b7f5c;
    --accent-soft: #e9eee0;
    --accent-ink: #4a5b3f;
  }

  body[data-density="compact"] { --row-h: 34px; }
  body[data-density="regular"] { --row-h: 40px; }
  body[data-density="comfy"]   { --row-h: 46px; }

  body[data-radius="sharp"] { --radius: 6px; --radius-sm: 4px; }
  body[data-radius="round"] { --radius: 14px; --radius-sm: 10px; }
  body[data-radius="pill"]  { --radius: 22px; --radius-sm: 16px; }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }
  body {
    font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui, -apple-system, sans-serif;
    font-size: 14.5px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .serif { font-family: 'Fraunces', 'Times New Roman', serif; font-weight: 400; letter-spacing: -0.015em; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  button { font: inherit; color: inherit; }
  input, select, textarea { font: inherit; color: inherit; font-family: inherit; }
  ::selection { background: var(--accent-soft); color: var(--accent-ink); }
  a { color: inherit; text-decoration: none; }

  /* ── Atoms ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
  }
  .card-pad { padding: 22px 24px; }

  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: var(--radius-pill);
    background: var(--surface-2); border: 1px solid var(--line);
    font-size: 12px; color: var(--ink-2); font-weight: 500;
  }
  .pill-accent { background: var(--accent-soft); border-color: transparent; color: var(--accent-ink); }
  .pill-good { background: var(--good-soft); border-color: transparent; color: var(--good); }
  .pill-rose { background: var(--rose-soft); border-color: transparent; color: var(--rose); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex: 0 0 6px; }

  .btn {
    appearance: none; cursor: pointer;
    border: 1px solid var(--line-strong); background: var(--surface);
    height: 38px; padding: 0 16px; border-radius: var(--radius-sm);
    font-weight: 500; display: inline-flex; align-items: center; gap: 8px;
    transition: all 140ms cubic-bezier(.2,.8,.2,1);
    color: var(--ink);
  }
  .btn:hover { background: var(--surface-2); border-color: var(--ink-3); }
  .btn-primary {
    background: var(--accent); color: var(--accent-on); border-color: var(--accent);
    box-shadow: 0 1px 0 rgba(255,255,255,0.2) inset, var(--shadow-sm);
  }
  .btn-primary:hover { filter: brightness(1.05); border-color: var(--accent); background: var(--accent); }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--ink-2); }
  .btn-ghost:hover { background: var(--surface-2); color: var(--ink); border-color: transparent; }
  .btn-sm { height: 32px; padding: 0 12px; font-size: 13px; }
  .btn-lg { height: 44px; padding: 0 20px; font-size: 15px; }
  .btn-icon { width: 38px; padding: 0; justify-content: center; }
  .btn-icon.btn-sm { width: 32px; }

  .input, .select, .textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--line-strong);
    border-radius: var(--radius-sm);
    padding: 0 14px;
    height: var(--row-h);
    outline: none;
    transition: border-color 120ms, box-shadow 120ms, background 120ms;
    color: var(--ink);
  }
  .textarea { padding: 12px 14px; height: auto; resize: vertical; min-height: 92px; line-height: 1.55; }
  .input:focus, .select:focus, .textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }
  .input::placeholder, .textarea::placeholder { color: var(--ink-4); }
  .input-icon { position: relative; }
  .input-icon .input { padding-left: 38px; }
  .input-icon .ico {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--ink-3); width: 16px; height: 16px; pointer-events: none;
  }

  .label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--ink-2); margin-bottom: 6px; letter-spacing: 0.01em;
  }
  .label .req { color: var(--rose); margin-left: 2px; }
  .help { font-size: 12px; color: var(--ink-3); margin-top: 6px; }

  /* ── Layout ── */
  .app {
    display: grid;
    grid-template-columns: 244px 1fr;
    min-height: 100vh;
  }
  @media (max-width: 820px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .mobile-nav { display: flex !important; }
  }

  .sidebar {
    border-right: 1px solid var(--line);
    background: var(--surface-2);
    padding: 18px 14px 14px;
    display: flex; flex-direction: column; gap: 2px;
    position: sticky; top: 0; height: 100vh;
  }
  .brand {
    display: flex; align-items: center; gap: 11px;
    padding: 6px 8px 22px;
  }
  .brand-mark {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent-ink));
    color: var(--accent-on);
    display: grid; place-items: center;
    font-family: 'Fraunces', serif;
    font-size: 19px; font-style: italic; font-weight: 500;
    letter-spacing: -0.02em;
    box-shadow: var(--shadow-sm);
  }
  .brand-title { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 500; letter-spacing: -0.01em; line-height: 1.1; }
  .brand-sub { font-size: 11px; color: var(--ink-3); margin-top: 1px; letter-spacing: 0.06em; text-transform: uppercase; }

  .nav-section { font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--ink-4); padding: 16px 10px 6px; }
  .nav-item {
    display: flex; align-items: center; gap: 11px;
    padding: 9px 11px; border-radius: 9px;
    color: var(--ink-2); cursor: pointer; user-select: none;
    font-size: 14px; font-weight: 500;
    transition: background 120ms, color 120ms;
    border: 1px solid transparent;
  }
  .nav-item:hover { background: rgba(40,30,10,0.04); color: var(--ink); }
  .nav-item.active {
    background: var(--surface); color: var(--ink);
    border-color: var(--line); box-shadow: var(--shadow-sm);
  }
  .nav-item .ico { width: 18px; height: 18px; flex: 0 0 18px; opacity: 0.65; }
  .nav-item.active .ico { opacity: 1; color: var(--accent); }
  .nav-item .badge {
    margin-left: auto; font-size: 11px; padding: 1px 7px;
    background: var(--accent-soft); color: var(--accent-ink);
    border-radius: 999px; font-weight: 600;
  }
  .nav-spacer { flex: 1; }

  .user-card {
    display: flex; align-items: center; gap: 11px;
    padding: 11px; border-radius: 11px;
    background: var(--surface); border: 1px solid var(--line);
  }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, #f5d4c1, #d4a684);
    color: #5d3f1a; display: grid; place-items: center;
    font-size: 12px; font-weight: 600; flex: 0 0 32px;
  }
  .avatar-lg { width: 56px; height: 56px; font-size: 18px; flex: 0 0 56px; }
  .avatar-sm { width: 26px; height: 26px; font-size: 10px; flex: 0 0 26px; }

  .main { min-width: 0; display: flex; flex-direction: column; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding: 14px 28px; border-bottom: 1px solid var(--line);
    background: var(--bg);
    position: sticky; top: 0; z-index: 10;
    backdrop-filter: blur(8px);
  }
  .topbar .input-icon { max-width: 360px; flex: 1; }
  .topbar .input { background: var(--surface); }
  .topbar-actions { display: flex; align-items: center; gap: 8px; }

  .crumbs { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-3); }
  .crumbs .sep { color: var(--ink-4); }
  .crumbs .here { color: var(--ink); font-weight: 600; }

  .content { padding: 28px; max-width: 1280px; width: 100%; margin: 0 auto; }
  @media (max-width: 700px) { .content { padding: 18px; } .topbar { padding: 12px 16px; } }

  .page-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 24px; gap: 24px; flex-wrap: wrap; }
  .page-title { font-family: 'Fraunces', serif; font-size: 36px; line-height: 1.05; margin: 0; letter-spacing: -0.02em; font-weight: 500; }
  .page-title em { font-style: italic; color: var(--accent); font-weight: 400; }
  .page-sub { color: var(--ink-3); margin-top: 6px; font-size: 14px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .grid-asym { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
  @media (max-width: 1100px) {
    .grid-3, .grid-4 { grid-template-columns: repeat(2, 1fr); }
    .grid-asym { grid-template-columns: 1fr; }
  }
  @media (max-width: 600px) {
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  }

  /* ── Stats / Dashboard ── */
  .stat-card { padding: 18px 20px; }
  .stat-label { font-size: 12px; color: var(--ink-3); display: flex; align-items: center; gap: 8px; font-weight: 500; }
  .stat-value { font-family: 'Fraunces', serif; font-size: 34px; font-weight: 500; letter-spacing: -0.02em; margin-top: 8px; font-feature-settings: "tnum"; line-height: 1.05; }
  .stat-delta { font-size: 12px; margin-top: 6px; color: var(--good); display: inline-flex; align-items: center; gap: 4px; font-weight: 500; }
  .stat-delta.neg { color: var(--bad); }

  /* ── Tables ── */
  table.tbl { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13.5px; }
  table.tbl th {
    text-align: left; font-weight: 600; color: var(--ink-3);
    font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 12px 16px; border-bottom: 1px solid var(--line); background: var(--surface-2);
  }
  table.tbl th:first-child { border-top-left-radius: var(--radius); }
  table.tbl th:last-child  { border-top-right-radius: var(--radius); }
  table.tbl td {
    padding: 14px 16px; border-bottom: 1px solid var(--line);
    color: var(--ink-2); vertical-align: middle;
  }
  table.tbl tbody tr { cursor: pointer; transition: background 100ms; }
  table.tbl tbody tr:hover { background: var(--surface-2); }
  table.tbl tbody tr:last-child td { border-bottom: 0; }
  table.tbl td.primary { color: var(--ink); font-weight: 600; }
  table.tbl td .sub { color: var(--ink-3); font-size: 12px; margin-top: 2px; }
  .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--line); background: var(--surface); }

  /* ── Service buttons (centerpiece) ── */
  .svc-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  }
  @media (max-width: 900px) { .svc-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .svc-grid { grid-template-columns: 1fr; } }

  .svc-btn {
    appearance: none; cursor: pointer; text-align: left;
    padding: 16px;
    border: 1.5px solid var(--line-strong); border-radius: var(--radius);
    background: var(--surface);
    display: flex; flex-direction: column; gap: 6px;
    transition: all 160ms cubic-bezier(.2,.8,.2,1);
    position: relative;
    color: var(--ink);
  }
  .svc-btn:hover { border-color: var(--ink-3); transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .svc-btn.on {
    border-color: var(--accent); background: var(--accent-soft);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }
  .svc-btn.on .svc-name { color: var(--accent-ink); }
  .svc-check {
    position: absolute; top: 12px; right: 12px;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--surface); border: 1.5px solid var(--line-strong);
    display: grid; place-items: center;
    transition: all 160ms;
    color: transparent;
  }
  .svc-btn.on .svc-check {
    background: var(--accent); border-color: var(--accent); color: var(--accent-on);
  }
  .svc-icon-wrap {
    width: 40px; height: 40px; border-radius: 12px;
    background: var(--surface-2); display: grid; place-items: center;
    color: var(--ink-2); margin-bottom: 6px;
    transition: all 160ms;
  }
  .svc-btn.on .svc-icon-wrap { background: rgba(37,99,235,0.12); color: var(--accent); }
  body[data-variant="rose"] .svc-btn.on .svc-icon-wrap { background: rgba(214,71,127,0.14); }
  body[data-variant="sage"] .svc-btn.on .svc-icon-wrap { background: rgba(107,127,92,0.14); }

  .svc-name { font-weight: 600; font-size: 15px; color: var(--ink); }
  .svc-meta { font-size: 12.5px; color: var(--ink-3); display: flex; gap: 10px; align-items: center; }
  .svc-meta .price { font-variant-numeric: tabular-nums; font-weight: 500; color: var(--ink-2); }

  /* ── Section subtitles ── */
  .section-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--ink-3); margin: 0 0 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 1px; background: var(--line);
  }
  .form-section { padding: 24px 26px; }
  .form-section + .form-section { border-top: 1px solid var(--line); }

  /* ── Customer detail ── */
  .cust-hero { display: flex; gap: 20px; align-items: flex-start; padding: 26px; }
  .cust-name { font-family: 'Fraunces', serif; font-size: 32px; letter-spacing: -0.02em; line-height: 1.1; margin: 0; font-weight: 500; }
  .cust-meta-row { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 10px; color: var(--ink-3); font-size: 13.5px; }
  .cust-meta-row .row { gap: 6px; }

  /* ── Timeline ── */
  .timeline { position: relative; padding-left: 26px; }
  .timeline::before {
    content: ''; position: absolute; left: 7px; top: 8px; bottom: 8px;
    width: 1.5px; background: var(--line);
  }
  .tl-item { position: relative; padding-bottom: 22px; }
  .tl-item:last-child { padding-bottom: 0; }
  .tl-item::before {
    content: ''; position: absolute; left: -23px; top: 6px;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--surface); border: 2.5px solid var(--accent);
  }
  .tl-date { font-size: 12px; color: var(--ink-3); margin-bottom: 6px; font-variant-numeric: tabular-nums; font-weight: 500; }
  .tl-card {
    border: 1px solid var(--line); border-radius: var(--radius-sm);
    padding: 14px 16px; background: var(--surface);
  }

  /* ── Charts ── */
  .bars { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: grid; grid-template-columns: 110px 1fr 70px; gap: 12px; align-items: center; font-size: 13px; }
  .bar-track { height: 10px; background: var(--surface-2); border-radius: 6px; overflow: hidden; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-ink)); border-radius: 6px; transition: width 700ms cubic-bezier(.2,.8,.2,1); }
  .bar-val { text-align: right; color: var(--ink-2); font-variant-numeric: tabular-nums; font-size: 12.5px; font-weight: 600; }

  /* ── Stars ── */
  .stars { display: inline-flex; gap: 3px; }
  .star { cursor: pointer; padding: 2px; color: var(--ink-4); transition: color 120ms, transform 120ms; }
  .star.on { color: #e0a020; }
  .star:hover { transform: scale(1.15); }
  .stars-readonly .star { cursor: default; }
  .stars-readonly .star:hover { transform: none; }

  /* ── Filter chips ── */
  .filter-bar {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 14px 16px; border: 1px solid var(--line);
    background: var(--surface); border-radius: var(--radius); margin-bottom: 16px;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: var(--radius-pill);
    background: var(--surface-2); border: 1px solid var(--line);
    font-size: 12.5px; color: var(--ink-2); cursor: pointer; user-select: none;
    font-weight: 500; transition: all 120ms;
  }
  .chip:hover { border-color: var(--ink-3); }
  .chip.on { background: var(--accent); color: var(--accent-on); border-color: var(--accent); }
  .chip .x { opacity: 0.7; margin-left: 2px; font-size: 14px; line-height: 0; }

  /* ── Empty / placeholder ── */
  .empty { text-align: center; padding: 56px 24px; color: var(--ink-3); }
  .empty-ico { width: 48px; height: 48px; margin: 0 auto 14px; color: var(--ink-4); opacity: 0.7; }

  /* ── Photo placeholder ── */
  .photo-ph {
    aspect-ratio: 1/1; border-radius: var(--radius-sm);
    background: repeating-linear-gradient(45deg,
      var(--surface-2), var(--surface-2) 8px,
      var(--surface-3) 8px, var(--surface-3) 16px);
    border: 1px dashed var(--line-strong);
    display: grid; place-items: center;
    color: var(--ink-3); font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
    text-align: center; padding: 8px;
  }
  .photo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  @media (max-width: 600px) { .photo-grid { grid-template-columns: repeat(2, 1fr); } }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: white; padding: 12px 18px;
    border-radius: var(--radius-sm); font-size: 13px; box-shadow: var(--shadow-lg);
    display: flex; align-items: center; gap: 10px;
    animation: toast-in 220ms cubic-bezier(.2,.8,.2,1);
    z-index: 1000; font-weight: 500;
  }
  @keyframes toast-in {
    from { opacity: 0; transform: translate(-50%, 12px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }

  /* ── Misc ── */
  .row { display: flex; align-items: center; gap: 10px; }
  .row-between { justify-content: space-between; }
  .grow { flex: 1; }
  .muted { color: var(--ink-3); }
  .strong { color: var(--ink); font-weight: 600; }
  .num { font-variant-numeric: tabular-nums; }
  .kbd {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; padding: 2px 6px; border-radius: 5px;
    background: var(--surface-2); border: 1px solid var(--line); color: var(--ink-3);
  }
  hr.sep { border: 0; border-top: 1px solid var(--line); margin: 18px 0; }

  .mobile-nav {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--line);
    padding: 8px 8px calc(8px + env(safe-area-inset-bottom));

    z-index: 50;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.04);
  }
  .mobile-nav .nav-item { flex-direction: column; gap: 2px; padding: 6px 10px; font-size: 11px; }
  .mobile-nav .nav-item .ico { width: 20px; height: 20px; flex: 0 0 20px; }
  .mobile-nav .nav-item.active { background: transparent; border: none; box-shadow: none; }
  .mobile-nav .nav-item.active .ico { color: var(--accent); opacity: 1; }
  @media (max-width: 820px) { .content { padding-bottom: 90px; } }

  /* Big quick action */
  .quick-action {
    display: flex; align-items: center; gap: 16px;
    padding: 22px 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent-ink));
    color: var(--accent-on);
    border-radius: var(--radius);
    cursor: pointer; transition: transform 160ms;
    box-shadow: var(--shadow-md);
  }
  .quick-action:hover { transform: translateY(-2px); }
  .quick-action .qa-ico {
    width: 52px; height: 52px; border-radius: 14px;
    background: rgba(255,255,255,0.18);
    display: grid; place-items: center; flex: 0 0 52px;
  }
  .quick-action h3 { font-family: 'Fraunces', serif; font-weight: 500; margin: 0; font-size: 22px; letter-spacing: -0.01em; }
  .quick-action p { margin: 2px 0 0; opacity: 0.85; font-size: 13.5px; }
