# Netlify configuration for ASY Beauté CRM
# No build step — Netlify serves static files from the repo root.

[build]
  publish = "."

# Serve CRM.html at the root so magic link tokens in the URL hash are preserved
[[redirects]]
  from = "/"
  to   = "/CRM.html"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/CRM.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*.jsx"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type  = "application/javascript"
